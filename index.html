  <!-- Open Graph / Social Media -->
  <meta property="og:type" content="website" />

    content="Product Designer specializing in complex systems, operations logic, and intuitive UX." />

    content="Product Designer specializing in complex systems, operations logic, and intuitive UX." />

  <!-- Theme Color -->
  <meta name="theme-color" content="#D4FF50" />

  <!-- Prevent FOUC (Flash of Unstyled Content) -->
  <style>
    /* Critical CSS: Prevent layout shift during font loading */
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Initial loader to prevent white flash */
    #root:empty::before {
      content: '';
      display: block;
      position: fixed;
      top: 50%;
      left: 50%;
      width: 40px;
      height: 40px;
      margin: -20px 0 0 -20px;
      border: 3px solid rgba(212, 255, 80, 0.2);
      border-left-color: #D4FF50;
      border-radius: 50%;
      animation: initial-spin 1s linear infinite;
    }

    #root:empty {
      min-height: 100vh;
      background: #2C2E2A;
    }

    @keyframes initial-spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <!-- Skip Link for Accessibility -->
  <noscript>
    <div style="padding: 20px; text-align: center; background: #D4FF50; color: #2C2E2A;">
      This website requires JavaScript to function properly. Please enable JavaScript in your browser.
    </div>
  </noscript>

  <div id="root"></div>

  <script type="module" src="/src/main.tsx"></script>
</body>
